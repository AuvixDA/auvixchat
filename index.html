<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AUVIX</title>
    <link rel="manifest" href="/auvixchat/manifest.json">
    <meta name="theme-color" content="#060608">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AUVIX">
    <link rel="apple-touch-icon" href="/auvixchat/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:      #060608;
            --s1:      #0d0e12;
            --s2:      #13141a;
            --s3:      #1a1b23;
            --border:  #ffffff0f;
            --border2: #ffffff18;
            --acc:     #c8ff00;
            --acc2:    #00d4ff;
            --acc3:    #ff3d6e;
            --text:    #f0f0f5;
            --muted:   #55576a;
            --muted2:  #8889a0;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
        }

        /* noise overlay */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.028;
            pointer-events: none;
            z-index: 9999;
        }

        /* ═══ AUTH ═══════════════════════════════════════════ */
        #auth-screen {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        #auth-screen::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(200,255,0,.06) 0%, transparent 70%);
            top: -200px; right: -200px;
            pointer-events: none;
        }
        #auth-screen::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,212,255,.05) 0%, transparent 70%);
            bottom: -200px; left: -100px;
            pointer-events: none;
        }

        .auth-wrap {
            width: 100%; max-width: 400px;
            animation: fadeUp .5s ease both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(20px); }
            to   { opacity:1; transform: translateY(0); }
        }

        .auth-logo {
            font-family: 'Syne', sans-serif;
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1;
        }
        .auth-logo .dot { color: var(--acc); }

        .auth-sub {
            font-size: 12px;
            color: var(--muted2);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border2);
        }
        .auth-tab {
            padding: 10px 20px 12px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all .2s;
            user-select: none;
        }
        .auth-tab.active { color: var(--acc); border-bottom-color: var(--acc); }

        .auth-field { margin-bottom: 16px; }
        .auth-field label {
            display: block;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: var(--s2);
            border: 1px solid var(--border2);
            padding: 13px 16px;
            border-radius: 4px;
            color: var(--text);
            font-size: 14px;
            font-family: 'DM Mono', monospace;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        input:focus {
            border-color: var(--acc);
            box-shadow: 0 0 0 3px rgba(200,255,0,.08);
        }
        input::placeholder { color: var(--muted); }

        .btn-main {
            width: 100%;
            background: var(--acc);
            color: #060608;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
            transition: all .2s;
            position: relative;
            overflow: hidden;
        }
        .btn-main::after {
            content: '';
            position: absolute; inset: 0;
            background: rgba(255,255,255,0);
            transition: background .2s;
        }
        .btn-main:active::after { background: rgba(255,255,255,.15); }

        .auth-err {
            font-size: 12px;
            color: var(--acc3);
            margin-top: 12px;
            min-height: 16px;
            letter-spacing: .5px;
        }

        /* ═══ APP ════════════════════════════════════════════ */
        #app-screen {
            display: none;
            height: 100%;
        }

        .layout {
            display: flex;
            height: 100%;
        }

        /* ═══ SIDEBAR ════════════════════════════════════════ */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--s1);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform .3s cubic-bezier(.4,0,.2,1);
            z-index: 10;
        }

        .sidebar-top {
            padding: 20px 20px 16px;
            padding-top: calc(20px + env(safe-area-inset-top));
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text);
            margin-bottom: 16px;
        }
        .brand .dot { color: var(--acc); }

        .me-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding: 10px;
            background: var(--s2);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .me-ava {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--acc);
            color: #060608;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 14px; font-weight: 800;
            flex-shrink: 0;
        }

        .me-info { flex: 1; min-width: 0; }
        .me-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .me-tag  { font-size: 11px; color: var(--acc); letter-spacing: .5px; }

        .search-row { display: flex; gap: 8px; }
        .search-row input { flex:1; padding: 9px 12px; font-size: 12px; border-radius: 4px; }

        .btn-find {
            background: var(--acc);
            color: #060608;
            border: none;
            padding: 9px 14px;
            border-radius: 4px;
            font-family: 'Syne', sans-serif;
            font-size: 12px; font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            letter-spacing: .5px;
        }
        .btn-find:active { opacity: .8; }

        .chats-label {
            padding: 14px 20px 8px;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .chats-list { flex: 1; overflow-y: auto; }
        .chats-list::-webkit-scrollbar { width: 2px; }
        .chats-list::-webkit-scrollbar-thumb { background: var(--border2); }

        .no-chats {
            padding: 30px 20px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.8;
        }
        .no-chats-icon { font-size: 32px; display: block; margin-bottom: 8px; opacity: .4; }

        .chat-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            border-left: 2px solid transparent;
            transition: all .15s;
            position: relative;
        }
        .chat-item::after {
            content: '';
            position: absolute;
            bottom: 0; left: 20px; right: 20px;
            height: 1px;
            background: var(--border);
        }
        .chat-item:hover { background: var(--s2); }
        .chat-item.active { background: var(--s2); border-left-color: var(--acc); }

        .ci-ava {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--s3);
            border: 1px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }

        .ci-meta { flex: 1; min-width: 0; }
        .ci-tag {
            font-family: 'Syne', sans-serif;
            font-size: 13px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text);
        }
        .ci-prev {
            font-size: 11px; color: var(--muted2);
            margin-top: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ═══ CHAT AREA ══════════════════════════════════════ */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            min-width: 0;
            position: relative;
        }

        /* grid bg pattern */
        .chat-area::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: .4;
            pointer-events: none;
        }

        .chat-header {
            padding: 16px 24px;
            padding-top: calc(16px + env(safe-area-inset-top));
            background: rgba(6,6,8,.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 2;
        }

        .back-btn {
            display: none;
            background: var(--s2); border: 1px solid var(--border2);
            color: var(--text); font-size: 18px;
            width: 36px; height: 36px; border-radius: 4px;
            cursor: pointer; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .ch-ava {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--s3); border: 1px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }

        .ch-info h3 {
            font-family: 'Syne', sans-serif;
            font-size: 15px; font-weight: 700;
            color: var(--acc);
            letter-spacing: -.3px;
        }
        .ch-info p { font-size: 11px; color: var(--muted2); letter-spacing: .5px; }

        .empty-state {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px;
            position: relative; z-index: 1;
        }

        .empty-logo {
            font-family: 'Syne', sans-serif;
            font-size: 64px; font-weight: 800;
            color: var(--border2);
            letter-spacing: -4px;
            line-height: 1;
        }
        .empty-sub { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

        .messages-wrap {
            flex: 1; overflow-y: auto;
            padding: 24px 24px 16px;
            display: flex; flex-direction: column; gap: 4px;
            position: relative; z-index: 1;
        }
        .messages-wrap::-webkit-scrollbar { width: 2px; }
        .messages-wrap::-webkit-scrollbar-thumb { background: var(--border2); }

        /* message grouping — same sender */
        .message { display: flex; flex-direction: column; max-width: 68%; margin-bottom: 2px; }
        .message.mine   { align-self: flex-end;  align-items: flex-end; }
        .message.theirs { align-self: flex-start; align-items: flex-start; }
        .message.first  { margin-top: 10px; }

        .msg-author {
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--acc);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .message.mine .msg-author { color: var(--muted2); }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 2px;
            font-size: 13px;
            line-height: 1.6;
            word-break: break-word;
            position: relative;
        }
        .message.mine .msg-bubble {
            background: var(--acc);
            color: #060608;
            border-radius: 6px 2px 2px 6px;
        }
        .message.theirs .msg-bubble {
            background: var(--s2);
            color: var(--text);
            border: 1px solid var(--border2);
            border-radius: 2px 6px 6px 2px;
        }

        /* last bubble in group gets full corner */
        .message.mine.last   .msg-bubble { border-bottom-right-radius: 6px; }
        .message.theirs.last .msg-bubble { border-bottom-left-radius: 6px; }

        .msg-bubble img {
            max-width: 220px; max-height: 280px;
            border-radius: 4px; display: block; cursor: pointer;
            margin: -2px;
        }

        .msg-time {
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: .5px;
        }

        /* ═══ INPUT ══════════════════════════════════════════ */
        .input-area {
            padding: 16px 24px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            background: rgba(6,6,8,.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative; z-index: 2;
        }

        .upload-bar {
            position: absolute;
            top: -3px; left: 0; right: 0;
            height: 3px;
            background: var(--border);
            display: none;
        }
        .upload-bar.on { display: block; }
        .upload-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--acc), var(--acc2));
            width: 0%;
            transition: width .2s;
        }

        .btn-attach {
            width: 42px; height: 42px;
            background: var(--s2);
            border: 1px solid var(--border2);
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            font-size: 16px;
            transition: border-color .2s;
            color: var(--muted2);
        }
        .btn-attach:hover { border-color: var(--acc); color: var(--acc); }
        #file-input { display: none; }

        .input-area input {
            flex: 1; padding: 11px 16px;
            font-size: 13px; border-radius: 4px;
            background: var(--s2);
            border: 1px solid var(--border2);
        }
        .input-area input:focus { border-color: var(--acc); box-shadow: 0 0 0 3px rgba(200,255,0,.06); }

        .btn-send {
            width: 42px; height: 42px;
            background: var(--acc);
            border: none; border-radius: 4px;
            color: #060608;
            font-size: 18px;
            cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: opacity .2s;
        }
        .btn-send:active { opacity: .8; }

        /* ═══ LIGHTBOX ═══════════════════════════════════════ */
        #lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.95);
            z-index: 1000;
            align-items: center; justify-content: center;
        }
        #lightbox.open { display: flex; }
        #lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 4px; }
        #lb-close {
            position: absolute; top: 20px; right: 24px;
            font-size: 28px; color: var(--muted2);
            cursor: pointer; line-height: 1;
            font-family: 'Syne', sans-serif;
        }
        #lb-close:hover { color: var(--text); }

        /* ═══ TOAST ══════════════════════════════════════════ */
        #toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--s2);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 10px 20px; border-radius: 4px;
            font-size: 12px; letter-spacing: .5px;
            transition: transform .25s ease;
            z-index: 9998; white-space: nowrap;
            pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.err  { border-color: var(--acc3); color: var(--acc3); }

        .hidden { display: none !important; }

        /* ═══ MOBILE ═════════════════════════════════════════ */
        @media (max-width: 600px) {
            .sidebar {
                position: absolute; top:0; left:0; bottom:0;
                width: 100%; min-width: unset;
            }
            .sidebar.gone { transform: translateX(-100%); }
            .chat-area { position: absolute; inset: 0; }
            .chat-area.gone { display: none; }
            .back-btn { display: flex; }
            .message { max-width: 82%; }
        }
    </style>
</head>
<body>

<!-- ═══ AUTH ════════════════════════════════════════════ -->
<div id="auth-screen">
    <div class="auth-wrap">
        <div class="auth-logo">AUVIX<span class="dot">.</span></div>
        <div class="auth-sub">Encrypted · Private · Fast</div>

        <div class="auth-tabs">
            <div class="auth-tab active" id="t-reg" onclick="switchTab('reg')">Register</div>
            <div class="auth-tab" id="t-login" onclick="switchTab('login')">Sign In</div>
        </div>

        <div id="f-reg">
            <div class="auth-field"><label>Display Name</label><input type="text" id="reg-name" placeholder="Your name" autocomplete="off"></div>
            <div class="auth-field"><label>Tag / Handle</label><input type="text" id="reg-tag" placeholder="@username" autocomplete="off"></div>
            <div class="auth-field"><label>Password</label><input type="password" id="reg-pass" placeholder="Min 4 characters"></div>
            <button class="btn-main" onclick="register()">Create Account →</button>
        </div>

        <div id="f-login" class="hidden">
            <div class="auth-field"><label>Tag / Handle</label><input type="text" id="login-tag" placeholder="@username" autocomplete="off"></div>
            <div class="auth-field"><label>Password</label><input type="password" id="login-pass" placeholder="Your password"></div>
            <button class="btn-main" onclick="login()">Enter AUVIX →</button>
        </div>

        <div class="auth-err" id="auth-err"></div>
    </div>
</div>

<!-- ═══ APP ══════════════════════════════════════════════ -->
<div id="app-screen">
    <div class="layout">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="brand">AUVIX<span class="dot">.</span></div>
                <div class="me-row">
                    <div class="me-ava" id="my-ava">?</div>
                    <div class="me-info">
                        <div class="me-name" id="my-name">—</div>
                        <div class="me-tag"  id="my-tag">—</div>
                    </div>
                </div>
                <div class="search-row">
                    <input type="text" id="search-inp" placeholder="Find @tag..."
                        autocomplete="off" onkeypress="if(event.key==='Enter')findChat()">
                    <button class="btn-find" onclick="findChat()">Find</button>
                </div>
            </div>
            <div class="chats-label">Conversations</div>
            <div class="chats-list" id="chats-list">
                <div class="no-chats">
                    <span class="no-chats-icon">◈</span>
                    No chats yet.<br>Find someone by @tag
                </div>
            </div>
        </aside>

        <main class="chat-area gone" id="chat-area">
            <div class="empty-state">
                <div class="empty-logo">AUX</div>
                <div class="empty-sub">Select a conversation</div>
            </div>
        </main>

    </div>
</div>

<div id="lightbox">
    <span id="lb-close" onclick="closeLb()">✕</span>
    <img id="lb-img" src="" alt="">
</div>
<div id="toast"></div>

<script>
const CFG = {
    apiKey:            "AIzaSyAtcfxKSo1beQC8-YBDBfkvWh66NzZBPH8",
    authDomain:        "auvix-messenger.firebaseapp.com",
    projectId:         "auvix-messenger",
    storageBucket:     "auvix-messenger.firebasestorage.app",
    messagingSenderId: "1000961865571",
    appId:             "1:1000961865571:web:506ed3a2fa5da4cb760556",
    databaseURL:       "https://auvix-messenger-default-rtdb.firebaseio.com"
};
const CL_CLOUD  = 'dhfmpwktc';
const CL_PRESET = 'ml_default1';

let db=null, me=null, activeCid=null, msgOff=null;
const rendered={};
const mob = ()=>window.innerWidth<=600;

window.addEventListener('load',()=>{
    try {
        if(typeof firebase==='undefined'){ console.error('Firebase SDK not loaded'); return; }
        firebase.initializeApp(CFG);
        db = firebase.database();
        const s = localStorage.getItem('auvix_me');
        if(s){ try{ me=JSON.parse(s); enterApp(); }catch(e){ localStorage.removeItem('auvix_me'); } }
    } catch(e){ console.error(e); }
});

// helpers
const safe  = t => t.replace('@','').replace(/[.#$\[\]]/g,'_').toLowerCase();
const cid   = (a,b)=>[safe(a),safe(b)].sort().join('__');
const esc   = s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt   = ts=>{ const d=new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };

function toast(msg,err=false){
    const t=document.getElementById('toast');
    t.textContent=msg; t.className='show'+(err?' err':'');
    clearTimeout(t._t); t._t=setTimeout(()=>t.className='',2800);
}
function setErr(m){ document.getElementById('auth-err').textContent=m; }

function switchTab(tab){
    document.getElementById('f-reg').classList.toggle('hidden',tab!=='reg');
    document.getElementById('f-login').classList.toggle('hidden',tab!=='login');
    document.getElementById('t-reg').classList.toggle('active',tab==='reg');
    document.getElementById('t-login').classList.toggle('active',tab==='login');
    setErr('');
}

async function register(){
    const name=document.getElementById('reg-name').value.trim();
    let tag=document.getElementById('reg-tag').value.trim().toLowerCase();
    const pass=document.getElementById('reg-pass').value;
    if(!name||!tag||!pass) return setErr('Fill all fields');
    if(pass.length<4) return setErr('Password min 4 chars');
    if(!tag.startsWith('@')) tag='@'+tag;
    if(!/^@[a-z0-9_]+$/.test(tag)) return setErr('Tag: latin, digits, _ only');
    const snap=await db.ref('users/'+safe(tag)).get();
    if(snap.exists()) return setErr('Tag already taken');
    await db.ref('users/'+safe(tag)).set({name,tag,pass});
    me={name,tag,pass}; enterApp();
}

async function login(){
    let tag=document.getElementById('login-tag').value.trim().toLowerCase();
    const pass=document.getElementById('login-pass').value;
    if(!tag||!pass) return setErr('Enter tag and password');
    if(!tag.startsWith('@')) tag='@'+tag;
    const snap=await db.ref('users/'+safe(tag)).get();
    if(!snap.exists()) return setErr('User not found');
    if(snap.val().pass!==pass) return setErr('Wrong password');
    me=snap.val(); enterApp();
}

function enterApp(){
    localStorage.setItem('auvix_me',JSON.stringify(me));
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    document.getElementById('my-name').textContent=me.name;
    document.getElementById('my-tag').textContent=me.tag;
    document.getElementById('my-ava').textContent=me.name[0].toUpperCase();
    loadChats();
}

function showSidebar(){ document.getElementById('sidebar').classList.remove('gone'); document.getElementById('chat-area').classList.add('gone'); }
function showChat(){ if(mob()){ document.getElementById('sidebar').classList.add('gone'); } document.getElementById('chat-area').classList.remove('gone'); }

function loadChats(){
    db.ref('user_chats/'+safe(me.tag)).on('value',snap=>{
        if(!snap.exists()) return;
        snap.forEach(c=>{ if(!rendered[c.key]) addToSidebar(c.key,c.val().partnerTag); });
    });
}

async function findChat(){
    let tag=document.getElementById('search-inp').value.trim().toLowerCase();
    if(!tag) return;
    if(!tag.startsWith('@')) tag='@'+tag;
    if(tag===me.tag) return toast('Cannot chat with yourself',true);
    const snap=await db.ref('users/'+safe(tag)).get();
    if(!snap.exists()) return toast('User '+tag+' not found',true);
    document.getElementById('search-inp').value='';
    const id=cid(me.tag,tag);
    addToSidebar(id,tag);
    openChat(id,tag);
}

function addToSidebar(id,partnerTag){
    if(rendered[id]) return;
    document.querySelector('.no-chats')?.remove();
    const el=document.createElement('div');
    el.className='chat-item'; el.id='si-'+id;
    el.innerHTML=`
        <div class="ci-ava">◈</div>
        <div class="ci-meta">
            <div class="ci-tag">${esc(partnerTag)}</div>
            <div class="ci-prev" id="pr-${id}">No messages</div>
        </div>`;
    el.addEventListener('click',()=>openChat(id,partnerTag));
    document.getElementById('chats-list').appendChild(el);
    rendered[id]=el;
    db.ref('messages/'+id).limitToLast(1).on('value',snap=>{
        const el=document.getElementById('pr-'+id);
        if(!el||!snap.exists()) return;
        snap.forEach(c=>{ const m=c.val(); el.textContent=(m.type==='image'?'🖼 Photo':(m.senderTag===me.tag?'You: ':'')+m.text); });
    });
}

function openChat(id,partnerTag){
    document.querySelectorAll('.chat-item').forEach(e=>e.classList.remove('active'));
    rendered[id]?.classList.add('active');
    if(msgOff){ db.ref('messages/'+activeCid).off('value',msgOff); msgOff=null; }
    activeCid=id;

    const area=document.getElementById('chat-area');
    area.innerHTML=`
        <div class="chat-header">
            <button class="back-btn" onclick="showSidebar()">‹</button>
            <div class="ch-ava">◈</div>
            <div class="ch-info">
                <h3>${esc(partnerTag)}</h3>
                <p>Direct Message</p>
            </div>
        </div>
        <div class="upload-bar" id="ubar"><div class="upload-fill" id="ufill"></div></div>
        <div class="messages-wrap" id="msgs"></div>
        <div class="input-area">
            <label class="btn-attach" title="Attach photo">
                📎<input type="file" id="file-input" accept="image/*" onchange="sendPhoto(this)">
            </label>
            <input type="text" id="msg-inp" placeholder="Message..."
                onkeypress="if(event.key==='Enter')sendMsg()">
            <button class="btn-send" onclick="sendMsg()">↑</button>
        </div>`;

    showChat();

    let prevSender=null;
    msgOff=db.ref('messages/'+id).on('value',snap=>{
        const wrap=document.getElementById('msgs');
        if(!wrap) return;
        wrap.innerHTML=''; prevSender=null;
        if(snap.exists()){
            const arr=[];
            snap.forEach(c=>arr.push(c.val()));
            arr.forEach((m,i)=>{
                const mine=m.senderTag===me.tag;
                const isFirst=m.senderTag!==prevSender;
                const isLast=i===arr.length-1||arr[i+1].senderTag!==m.senderTag;
                prevSender=m.senderTag;
                const div=document.createElement('div');
                div.className='message '+(mine?'mine':'theirs')+(isFirst?' first':'')+(isLast?' last':'');
                let content=m.type==='image'
                    ? `<img src="${esc(m.url)}" loading="lazy" onclick="openLb('${esc(m.url)}')">`
                    : esc(m.text);
                div.innerHTML=`
                    ${isFirst?`<div class="msg-author">${esc(m.senderName)}</div>`:''}
                    <div class="msg-bubble">${content}</div>
                    ${isLast?`<div class="msg-time">${fmt(m.ts)}</div>`:''}`;
                wrap.appendChild(div);
            });
        }
        wrap.scrollTop=wrap.scrollHeight;
    });

    const mk=safe(me.tag), pk=safe(partnerTag);
    db.ref('user_chats/'+mk+'/'+id).set({partnerTag});
    db.ref('user_chats/'+pk+'/'+id).set({partnerTag:me.tag});
}

function sendMsg(){
    const inp=document.getElementById('msg-inp');
    if(!inp) return;
    const text=inp.value.trim();
    if(!text||!activeCid) return;
    inp.value='';
    db.ref('messages/'+activeCid).push({type:'text',senderTag:me.tag,senderName:me.name,text,ts:Date.now()});
}

function sendPhoto(input){
    const file=input.files[0]; if(!file||!activeCid) return; input.value='';
    const reader=new FileReader();
    reader.onload=e=>{
        const img=new Image();
        img.onload=()=>{
            const cv=document.createElement('canvas');
            const mx=800; let w=img.width,h=img.height;
            if(w>mx||h>mx){ if(w>h){h=Math.round(h*mx/w);w=mx;}else{w=Math.round(w*mx/h);h=mx;} }
            cv.width=w; cv.height=h;
            cv.getContext('2d').drawImage(img,0,0,w,h);
            cv.toBlob(blob=>uploadCL(blob),'image/jpeg',0.82);
        };
        img.src=e.target.result;
    };
    reader.readAsDataURL(file);
}

function uploadCL(blob){
    const bar=document.getElementById('ubar'), fill=document.getElementById('ufill');
    if(bar) bar.classList.add('on');
    const fd=new FormData();
    fd.append('file',blob); fd.append('upload_preset',CL_PRESET); fd.append('folder','auvix');
    const xhr=new XMLHttpRequest();
    xhr.open('POST',`https://api.cloudinary.com/v1_1/${CL_CLOUD}/image/upload`);
    xhr.upload.onprogress=e=>{ if(fill&&e.lengthComputable) fill.style.width=Math.round(e.loaded/e.total*100)+'%'; };
    xhr.onload=()=>{
        if(bar){fill.style.width='0%';bar.classList.remove('on');}
        if(xhr.status===200){
            const r=JSON.parse(xhr.responseText);
            db.ref('messages/'+activeCid).push({type:'image',senderTag:me.tag,senderName:me.name,url:r.secure_url,ts:Date.now()});
        } else { toast('Upload failed',true); }
    };
    xhr.onerror=()=>{ if(bar)bar.classList.remove('on'); toast('Network error',true); };
    xhr.send(fd);
}

function openLb(url){ document.getElementById('lb-img').src=url; document.getElementById('lightbox').classList.add('open'); }
function closeLb(){ document.getElementById('lightbox').classList.remove('open'); document.getElementById('lb-img').src=''; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLb(); });
</script>
